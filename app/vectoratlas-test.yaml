apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vectoratlas-test
  namespace: argocd
spec:
  destination:
    namespace: vectoratlas-test
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/icipe-official/VA-Cube-Configs
    targetRevision: main
    path: environments/test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
