apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-vectoratlas-route
  namespace: vectoratlas
spec:
  hostnames:
  - test.vectoratlas.icipe.org
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: vectoratlas-gateway
    namespace: vectoratlas
    sectionName: https
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: ui
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
