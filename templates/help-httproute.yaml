apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: help
  namespace: vectoratlas
spec:
  parentRefs:
    - name: vectoratlasicipe-gateway
      namespace: vectoratlas
      sectionName: https               # matches the listener name on your Gateway
  hostnames:
    - vectoratlas.icipe.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /help               # equivalent to /help(/|$)(.*)
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /    # strip /help → /foo upstream
      backendRefs:
        - name: help
          port: 80
