apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: map-wms
  namespace: vectoratlas
spec:
  parentRefs:
    - name: vectoratlas-gateway
      namespace: vectoratlas
      sectionName: https                  # listener name on your Gateway
  hostnames:
    - test.vectoratlas.icipe.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /map-wms               # equivalent to /map-wms(/|$)(.*)
      filters:
        # nginx: /map-wms(/|$)(.*) + rewrite-target: /geoserver/Interventions/wms$2
        # Gateway API: replace /map-wms with /geoserver/Interventions/wms and keep the rest
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /geoserver/Interventions/wms
        # override Host header like nginx.ingress.kubernetes.io/upstream-vhost
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: malariaatlas-host-headers
      backendRefs:
        - name: malariaatlas-service
          port: 443
