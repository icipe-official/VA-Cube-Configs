apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ingestion-api
  namespace: vectoratlas
spec:
  parentRefs:
    - name: vectoratlas-gateway
      namespace: vectoratlas
      sectionName: https                 # listener name on your Gateway
  hostnames:
    - test.vectoratlas.icipe.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /ingestion-api        # equivalent to /ingestion-api(/|$)(.*)
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /      # strip /ingestion-api:
                                        #   /ingestion-api       -> /
                                        #   /ingestion-api/x     -> /x
                                        #   /ingestion-api/x/y   -> /x/y
      backendRefs:
        - name: python-backend
          port: 8000
