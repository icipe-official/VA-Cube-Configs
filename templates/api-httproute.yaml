apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vector-api
  namespace: vectoratlas
spec:
  parentRefs:
    - name: vectoratlas-gateway
      namespace: vectoratlas
      sectionName: https        # listener name from your Gateway
  hostnames:
    - test.vectoratlas.icipe.org
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /vector-api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /   # strip /vector-api → /foo upstream
      backendRefs:
        - name: api
          port: 3001
